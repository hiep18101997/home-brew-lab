name: coffee_brewing_companion
description: "A Flutter app for Home Barista to track beans, log brews, and use brew guides with timer."
publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  google_fonts: ^6.1.0
  uuid: ^4.2.1
  intl: ^0.18.1
  image_picker: ^1.0.7
  google_mlkit_selfie_segmentation: ^0.6.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
