name: coffee_brewing_companion
description: "A Flutter app for Home Barista to track beans, log brews, and use brew guides with timer."
publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  google_fonts: ^6.1.0
  uuid: ^4.2.1
  intl: ^0.18.1
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5
  drift: ^2.30.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5
  get_it: ^8.0.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.30.0
  build_runner: ^2.10.4

flutter:
  uses-material-design: true
